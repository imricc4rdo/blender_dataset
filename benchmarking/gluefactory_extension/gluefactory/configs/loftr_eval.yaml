# LoFTR (kornia) evaluation config
# Benchmarks: HPatches, MegaDepth-1500, ScanNet-1500, Blender
model:
    name: two_view_pipeline
    extractor:
        name: null
    matcher:
        name: matchers.kornia_loftr
benchmarks:
    hpatches:
        eval:
            estimator: opencv
            ransac_th: -1
    megadepth1500:
        data:
            preprocessing:
                side: long
                resize: 1024
        eval:
            estimator: opencv
            ransac_th: 0.5
    scannet1500:
        eval:
            estimator: opencv
            ransac_th: 1.0
    blender:
        data:
            name: blender
            preprocessing:
                resize: 1024