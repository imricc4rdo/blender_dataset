# SuperPoint + LSD + GlueStick (pretrained) evaluation config
# Benchmarks: HPatches, MegaDepth-1500, ScanNet-1500, Blender
model:
    name: gluefactory.models.two_view_pipeline
    extractor:
        name: gluefactory.models.lines.wireframe
        point_extractor:
            name: gluefactory_nonfree.superpoint
            trainable: False
            dense_outputs: True
            max_num_keypoints: 2048
            force_num_keypoints: False
            detection_threshold: 0
        line_extractor:
            name: gluefactory.models.lines.lsd
            trainable: False
            max_num_lines: 512
            force_num_lines: False
            min_length: 15
        wireframe_params:
            merge_points: True
            merge_line_endpoints: True
            nms_radius: 3
    matcher:
        name: gluefactory.models.matchers.gluestick
        weights: checkpoint_GlueStick_MD
benchmarks:
    hpatches:
        eval:
            # estimator: homography_estimator
            estimator: poselib
            ransac_th: -1
    megadepth1500:
        data:
            preprocessing:
                side: long
                resize: 1024
        eval:
            estimator: poselib
            ransac_th: -1
    scannet1500:
        eval:
            estimator: poselib
            ransac_th: -1
    blender:
        data:
            name: blender
            preprocessing:
                resize: 1024