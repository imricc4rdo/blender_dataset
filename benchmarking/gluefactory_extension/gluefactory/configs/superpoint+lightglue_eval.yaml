# SuperPoint + LightGlue (pretrained) evaluation config
# Benchmarks: HPatches, MegaDepth-1500, ScanNet-1500, Blender
model:
    name: two_view_pipeline
    extractor:
        name: gluefactory_nonfree.superpoint
        max_num_keypoints: 2048
        detection_threshold: 0.0
        nms_radius: 3
    matcher:
        name: matchers.lightglue_pretrained
        features: superpoint
        depth_confidence: -1
        width_confidence: -1
        filter_threshold: 0.1
benchmarks:
    hpatches:
        eval:
            estimator: opencv
            ransac_th: 0.5
        model:
            extractor:
                max_num_keypoints: 1024
    megadepth1500:
        data:
            preprocessing:
                side: long
                resize: 1024
        eval:
            estimator: opencv
            ransac_th: 0.5
    scannet1500:
        eval:
            estimator: opencv
            ransac_th: 1.0
    blender:
        data:
            name: blender
            preprocessing:
                resize: 1024